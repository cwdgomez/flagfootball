<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="meta-theme" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Live Game · CGMax FFTP</title>
<meta name="description" content="Live game scoreboard — CGMax Flag Football Tracker Pro. Watch the score update in real time from your phone.">
<meta property="og:title" content="🏈 Live Game — Tap to See the Score">
<meta property="og:description" content="Your coach is sharing a live scoreboard. Tap to watch the game score update in real time — no app needed.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://cgmaxfftp.com/og-parent.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="🏈 Live Game — Tap to See the Score">
<meta name="twitter:description" content="Watch the game score update in real time — no app needed.">
<meta name="twitter:image" content="https://cgmaxfftp.com/og-parent.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p:#AA0000;--p2:#770000;--s:#FFD700;
  --dark:#080808;--dark2:#111;--dark3:#1a1a1a;--dark4:#242424;--sur:#181818;
  --txt:#f2f2f2;--dim:#888;--dimmer:#444;
  --green:#22C55E;--blue:#3B82F6;--purple:#A855F7;--orange:#F97316;--rose:#F43F5E;--teal:#14B8A6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--dark);color:var(--txt);}
body{font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}

/* GRID BACKGROUND */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* MAIN LAYOUT */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.live-header{
  background:rgba(6,6,6,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:2px solid var(--s);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(220,0,0,.15);border:1px solid rgba(220,0,0,.4);
  border-radius:20px;padding:4px 11px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;color:#FF5555;text-transform:uppercase;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#FF5555;animation:livePulse 1.4s ease-in-out infinite;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.final-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:4px 11px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;color:var(--dim);text-transform:uppercase;
}
.hdr-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:rgba(255,215,0,.6);}
.hdr-refresh{
  background:none;border:1px solid rgba(255,255,255,.1);border-radius:8px;
  color:var(--dim);font-size:18px;width:34px;height:34px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.hdr-refresh:active{color:var(--s);border-color:var(--s);}

/* MATCHUP */
.matchup-section{padding:18px 16px 6px;text-align:center;}
.matchup-date{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}

/* SCOREBOARD */
.scoreboard{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 16px 4px;}
.score-team{flex:1;text-align:center;max-width:160px;}
.score-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:84px;line-height:.88;color:var(--dimmer);}
.score-num.us{color:var(--s);}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--dimmer);flex-shrink:0;}

/* QUARTER BAR */
.quarter-bar{display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 16px 12px;}
.q-pip{width:28px;height:6px;border-radius:3px;background:var(--dark3);border:1px solid var(--dimmer);transition:background .3s,border-color .3s;}
.q-pip.done{background:rgba(255,215,0,.2);border-color:rgba(255,215,0,.35);}
.q-pip.current{background:var(--s);border-color:var(--s);box-shadow:0 0 8px rgba(255,215,0,.4);}
.q-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--s);text-transform:uppercase;margin-left:6px;}

/* LAST UPDATE */
.last-update{text-align:center;padding:2px 16px 8px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dimmer);letter-spacing:1px;}

/* DIVIDER / SECTION LABEL */
.section-div{border:none;border-top:1px solid var(--dark3);margin:4px 16px 10px;}
.section-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--s);text-transform:uppercase;padding:0 16px;margin-bottom:8px;}

/* PLAYER STATS */
.stats-wrap{padding:0 12px 110px;}
.stat-card{background:var(--sur);border:1px solid var(--dark3);border-radius:14px;overflow:hidden;}
.stat-row{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--dark3);}
.stat-row:last-child{border-bottom:none;}
.stat-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:30px;flex-shrink:0;text-align:center;color:var(--dimmer);}
.stat-rank.g1{color:#FFD700;}
.stat-rank.g2{color:#C0C0C0;}
.stat-rank.g3{color:#CD7F32;}
.stat-name-wrap{flex:1;min-width:0;}
.stat-pname{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-qb-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--s);text-transform:uppercase;}
.stat-pills{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;}
.pill{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;border:1px solid;}
.pill-td{background:rgba(34,197,94,.14);color:#22C55E;border-color:rgba(34,197,94,.3);}
.pill-f{background:rgba(59,130,246,.14);color:#3B82F6;border-color:rgba(59,130,246,.3);}
.pill-c{background:rgba(168,85,247,.14);color:#A855F7;border-color:rgba(168,85,247,.3);}
.pill-int{background:rgba(249,115,22,.14);color:#F97316;border-color:rgba(249,115,22,.3);}
.pill-cv{background:rgba(20,184,166,.14);color:#14B8A6;border-color:rgba(20,184,166,.3);}
.pill-qbt{background:rgba(34,197,94,.14);color:#22C55E;border-color:rgba(34,197,94,.3);}
.pill-qbi{background:rgba(244,63,94,.14);color:#F43F5E;border-color:rgba(244,63,94,.3);}
.pill-blank{color:var(--dimmer);border-color:var(--dark3);background:transparent;}

/* Q SCORE ROW */
.q-score-row{display:flex;justify-content:center;gap:12px;padding:6px 16px 10px;flex-wrap:wrap;}
.q-score-item{text-align:center;}
.q-score-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--dimmer);text-transform:uppercase;}
.q-score-nums{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:2px;}
.q-us{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--s);}
.q-them{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--dim);}
.q-sep{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--dimmer);}

/* EMPTY / LOADING */
.center-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.center-icon{font-size:52px;margin-bottom:16px;}
.center-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--txt);margin-bottom:8px;}
.center-sub{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;color:var(--dim);line-height:1.7;}
.center-sub a{color:var(--s);text-decoration:none;}

/* ERROR BANNER */
.error-banner{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;margin:8px 16px;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:#F97316;letter-spacing:1px;display:none;}

/* FOOTER */
.live-footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(6,6,6,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--dark3);text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:2px;color:rgba(255,255,255,.18);text-transform:uppercase;
}
.live-footer a{color:rgba(255,215,0,.32);text-decoration:none;}
.live-footer a:hover{color:rgba(255,215,0,.65);}
</style>
</head>
<body>
<div class="bg-grid" id="bg-grid"></div>
<div class="page" id="page">

  <!-- HEADER -->
  <div class="live-header">
    <div id="live-status-badge" class="live-badge">
      <div class="live-dot"></div>LIVE
    </div>
    <div class="hdr-brand">CGMax FFTP</div>
    <button class="hdr-refresh" onclick="manualRefresh()" title="Refresh">⟳</button>
  </div>

  <!-- ERROR BANNER -->
  <div class="error-banner" id="error-banner"></div>

  <!-- DYNAMIC CONTENT -->
  <div id="main-content">
    <div class="center-box">
      <div class="center-icon">📡</div>
      <div class="center-title">CONNECTING…</div>
      <div class="center-sub">Tuning in to the live game feed</div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="live-footer">
  Powered by <a href="./index.html">CGMax FFTP</a> &mdash; Live Parent View
</div>

<script>
/* ═══════════════════════════════════════════════
   CGMax FFTP — Live Parent Scoreboard
   Supabase-powered polling — no Firebase needed
   Parents just open the link — zero setup!
═══════════════════════════════════════════════ */
(function(){
  'use strict';

  var LIVE_GAME_URL = 'https://cgmax-fftp-backend.vercel.app/api/live-game';
  var POLL_INTERVAL = 10000; // 10 seconds

  var params  = new URLSearchParams(window.location.search);
  var CODE    = (params.get('code')||params.get('s')||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);

  var pollTimer  = null;
  var lastData   = null;
  var failCount  = 0;

  /* ── Color helpers ── */
  function hexToRgb(hex){
    hex=(hex||'').replace('#','');
    if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');
    var r=parseInt(hex.substr(0,2),16)||0,g=parseInt(hex.substr(2,2),16)||0,b=parseInt(hex.substr(4,2),16)||0;
    return r+','+g+','+b;
  }
  function darken(hex,amt){
    hex=(hex||'#000000').replace('#','');
    if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');
    function h(v){return Math.max(0,parseInt(v,16)-amt).toString(16).padStart(2,'0');}
    return '#'+h(hex.substr(0,2))+h(hex.substr(2,2))+h(hex.substr(4,2));
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* ── Apply team colors ── */
  function setColors(primary,secondary){
    var root=document.documentElement;
    if(primary){
      root.style.setProperty('--p',primary);
      root.style.setProperty('--p2',darken(primary,50));
      var grid=document.getElementById('bg-grid');
      if(grid){
        grid.style.backgroundImage=
          'linear-gradient(rgba('+hexToRgb(primary)+',.06) 1px,transparent 1px),'
          +'linear-gradient(90deg,rgba('+hexToRgb(primary)+',.06) 1px,transparent 1px)';
        grid.style.backgroundSize='44px 44px';
      }
      var meta=document.getElementById('meta-theme');
      if(meta)meta.content=primary;
    }
    if(secondary)root.style.setProperty('--s',secondary);
  }

  /* ── Error / status display ── */
  function showError(msg){var el=document.getElementById('error-banner');if(el){el.textContent=msg;el.style.display='block';}}
  function clearError(){var el=document.getElementById('error-banner');if(el)el.style.display='none';}

  function showNoCode(){
    document.getElementById('main-content').innerHTML=
      '<div class="center-box">'
      +'<div class="center-icon">🔗</div>'
      +'<div class="center-title">NEED GAME LINK</div>'
      +'<div class="center-sub">Ask your coach to share today\'s live parent link from the CGMax app.<br><br>Tap <strong>📡 Live Score</strong> in the app to generate your link.</div>'
      +'</div>';
    var badge=document.getElementById('live-status-badge');
    if(badge){badge.className='final-badge';badge.innerHTML='OFFLINE';}
  }

  function showWaiting(){
    document.getElementById('main-content').innerHTML=
      '<div class="center-box">'
      +'<div class="center-icon">⏳</div>'
      +'<div class="center-title">WAITING FOR KICKOFF</div>'
      +'<div class="center-sub">You\'re connected! Stats will appear here as soon as your coach starts the game.<br><br>Code: <strong>'+esc(CODE)+'</strong></div>'
      +'</div>';
  }

  if(!CODE||CODE.length!==6){showNoCode();return;}

  /* ════════════ RENDER ════════════ */
  function renderState(data){
    clearError();
    lastData=data;
    failCount=0;

    var team     = data.team     || 'Us';
    var opp      = data.opp      || 'Them';
    var cq       = data.cq       || 1;
    var quarters = data.quarters || 2;
    var primary  = data.primary  || '#AA0000';
    var secondary= data.secondary|| '#FFD700';
    var qb       = data.qb       || '';
    var dateStr  = data.date     || '';
    var ts       = data.ts       || 0;

    setColors(primary,secondary);
    document.title=esc(team)+' vs '+esc(opp)+' · Live · CGMax FFTP';

    /* Scores */
    var scoresUs=[],scoresThem=[];
    try{var sc=JSON.parse(data.scores||'{}');scoresUs=sc.us||[];scoresThem=sc.them||[];}catch(e){}
    var usTotal  =scoresUs.reduce(function(a,b){return a+(b||0);},0);
    var themTotal=scoresThem.reduce(function(a,b){return a+(b||0);},0);

    /* Stats */
    var stats={};
    try{stats=JSON.parse(data.stats||'{}');}catch(e){}

    /* Roster & absent */
    var roster=[];try{roster=JSON.parse(data.roster||'[]');}catch(e){}
    var absent=[];try{absent=JSON.parse(data.absent||'[]');}catch(e){}

    /* Is final? */
    var now=Date.now();
    var isFinal=(ts>0&&(now-ts)>3*60*60*1000)||(cq>quarters);

    /* Quarter pips */
    var pipsHtml='';
    for(var q=1;q<=quarters;q++){
      var cls=q<cq?'q-pip done':q===cq&&!isFinal?'q-pip current':'q-pip';
      pipsHtml+='<div class="'+cls+'"></div>';
    }

    /* Badge */
    var badge=document.getElementById('live-status-badge');
    if(badge){
      if(isFinal){badge.className='final-badge';badge.innerHTML='FINAL';}
      else{badge.className='live-badge';badge.innerHTML='<div class="live-dot"></div>LIVE';}
    }

    /* Last update */
    var lastUpdateStr='';
    if(ts){
      var mins=Math.floor((now-ts)/60000);
      if(mins<1)lastUpdateStr='Updated just now';
      else if(mins<60)lastUpdateStr='Updated '+mins+'m ago';
      else lastUpdateStr='Updated '+Math.floor(mins/60)+'h ago';
    }

    /* Player scores */
    var allPlayers=roster.length>0?roster:Object.keys(stats);
    var playerScores=[];
    allPlayers.forEach(function(name){
      if(absent.indexOf(name)>=0)return;
      var totC=0,totT=0,totF=0,totI=0,totCV=0,totQBT=0,totQBI=0,totQBC=0;
      Object.keys(stats[name]||{}).forEach(function(q){
        var st=(stats[name]||{})[q]||{};
        totC+=st.catches||0;totT+=st.tds||0;totF+=st.flags||0;totI+=st.ints||0;
        totCV+=(st.conv1||0)+(st.conv2||0);
        totQBT+=st.qbTDs||0;totQBI+=st.qbInts||0;totQBC+=st.qbConvs||0;
      });
      var score=totQBT*10+totT*10+totI*8+totC*3+totF*2+totCV*4+totQBC*4-totQBI*3;
      playerScores.push({name:name,catches:totC,tds:totT,flags:totF,ints:totI,conv:totCV,qbTDs:totQBT,qbInts:totQBI,qbConvs:totQBC,score:score,isQB:name===qb});
    });
    playerScores.sort(function(a,b){return b.score-a.score;});

    /* Player rows */
    var rankIcons=['🥇','🥈','🎖️'],rankCls=['g1','g2','g3'];
    var statsHtml=playerScores.map(function(p,i){
      var pills='';
      if(p.isQB){
        if(p.qbTDs)pills+='<span class="pill pill-qbt">'+p.qbTDs+' TD</span>';
        if(p.qbInts)pills+='<span class="pill pill-qbi">'+p.qbInts+' INT</span>';
        if(p.qbConvs)pills+='<span class="pill pill-cv">'+p.qbConvs+' CV</span>';
      }else{
        if(p.tds)pills+='<span class="pill pill-td">'+p.tds+' TD</span>';
        if(p.flags)pills+='<span class="pill pill-f">'+p.flags+' Flag</span>';
        if(p.catches)pills+='<span class="pill pill-c">'+p.catches+' Rec</span>';
        if(p.ints)pills+='<span class="pill pill-int">'+p.ints+' INT</span>';
        if(p.conv)pills+='<span class="pill pill-cv">'+p.conv+' CV</span>';
      }
      if(!pills)pills='<span class="pill pill-blank">—</span>';
      var rankDisp=i<3?'<span class="'+rankCls[i]+'">'+rankIcons[i]+'</span>':'<span>'+(i+1)+'</span>';
      return '<div class="stat-row">'
        +'<div class="stat-rank">'+rankDisp+'</div>'
        +'<div class="stat-name-wrap">'
        +'<div class="stat-pname">'+esc(p.name)+'</div>'
        +(p.isQB?'<div class="stat-qb-tag">⚡ QB</div>':'')
        +'</div>'
        +'<div class="stat-pills">'+pills+'</div>'
        +'</div>';
    }).join('');

    /* Q-by-Q scores */
    var qScoreHtml='';
    if(scoresUs.length>1){
      qScoreHtml='<div class="q-score-row">';
      for(var qi=0;qi<quarters;qi++){
        qScoreHtml+='<div class="q-score-item">'
          +'<div class="q-score-lbl">Q'+(qi+1)+'</div>'
          +'<div class="q-score-nums">'
          +'<span class="q-us">'+(scoresUs[qi]||0)+'</span>'
          +'<span class="q-sep">–</span>'
          +'<span class="q-them">'+(scoresThem[qi]||0)+'</span>'
          +'</div></div>';
      }
      qScoreHtml+='</div>';
    }

    /* Date */
    var dateLine='';
    if(dateStr){try{dateLine=new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}catch(e){}}

    /* Assemble */
    var html='<div class="matchup-section">';
    if(dateLine)html+='<div class="matchup-date">'+dateLine+'</div>';
    html+='</div>';
    html+='<div class="scoreboard">'
      +'<div class="score-team"><div class="score-name">'+esc(team)+'</div><div class="score-num us">'+usTotal+'</div></div>'
      +'<div class="score-sep">–</div>'
      +'<div class="score-team"><div class="score-name">'+esc(opp)+'</div><div class="score-num">'+themTotal+'</div></div>'
      +'</div>';
    html+='<div class="quarter-bar">'+pipsHtml+'<div class="q-label">'+(isFinal?'FINAL':('Q'+cq))+'</div></div>';
    if(qScoreHtml)html+=qScoreHtml;
    if(lastUpdateStr)html+='<div class="last-update">'+lastUpdateStr+'</div>';
    if(playerScores.length>0){
      html+='<hr class="section-div"><div class="section-lbl">Player Performance</div>'
        +'<div class="stats-wrap"><div class="stat-card">'+statsHtml+'</div></div>';
    }else{
      html+='<div class="center-box" style="padding-top:20px;padding-bottom:20px;">'
        +'<div class="center-icon">🏈</div>'
        +'<div class="center-title">GAME ON!</div>'
        +'<div class="center-sub">Stats will appear here as your coach logs plays.</div>'
        +'</div>';
    }
    document.getElementById('main-content').innerHTML=html;
  }

  /* ════════════ POLLING ════════════ */
  function poll(){
    fetch(LIVE_GAME_URL+'?code='+encodeURIComponent(CODE))
      .then(function(r){return r.json();})
      .then(function(resp){
        if(!resp.found){
          if(!lastData)showWaiting();
          return;
        }
        renderState(resp.game_data);
      })
      .catch(function(){
        failCount++;
        if(failCount>=3){
          showError('⚠ Connection issue — retrying…');
        }
      });
  }

  /* Manual refresh */
  window.manualRefresh=function(){
    clearError();
    poll();
    var btn=document.querySelector('.hdr-refresh');
    if(btn){btn.textContent='✓';setTimeout(function(){btn.textContent='⟳';},1000);}
  };

  /* Start polling */
  showWaiting();
  poll(); // immediate first fetch
  pollTimer=setInterval(poll,POLL_INTERVAL);

  /* Stop polling when tab hidden, resume when visible */
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){
      if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
    }else{
      poll();
      pollTimer=setInterval(poll,POLL_INTERVAL);
    }
  });

})();
</script>
</body>
</html>
