<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stat Coach · CGMax FFTP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--sur:#111;--dark2:#141414;--dark3:#1a1a1a;--dark4:#222;--dark5:#2a2a2a;
  --txt:#f2f2f2;--dim:#888;--dimmer:#444;
  --green:#22c55e;--red:#ef4444;--teal:#14b8a6;--gold:#FFD700;
  --p:#CC0000;--s:#FFD700;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;}

/* ── HEADER ── */
.sc-header{background:var(--sur);border-bottom:1px solid var(--dark5);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;}
.sc-header-left{display:flex;flex-direction:column;min-width:0;}
.sc-team-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--txt);line-height:1;}
.sc-vs{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--dim);margin-top:2px;}
.sc-header-center{text-align:center;flex-shrink:0;}
.sc-quarter{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--dim);}
.sc-score{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--txt);line-height:1;}
.sc-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.sc-conn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.sc-conn-dot{width:7px;height:7px;border-radius:50%;background:var(--dimmer);flex-shrink:0;}
.sc-conn-dot.live{background:var(--green);}
.sc-conn-dot.error{background:var(--red);}
.sc-mode-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--teal);background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.25);border-radius:4px;padding:2px 6px;}

/* ── JOIN SCREEN ── */
.join-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;text-align:center;}
.join-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;color:var(--gold);margin-bottom:4px;}
.join-logo span{color:var(--red,#AA0000);}
.join-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--dim);margin-bottom:32px;}
.join-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
.join-input{width:100%;max-width:260px;background:var(--dark3);border:1.5px solid var(--dark5);border-radius:12px;padding:14px 16px;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:8px;color:var(--txt);text-align:center;outline:none;margin-bottom:16px;}
.join-input:focus{border-color:var(--teal);}
.join-btn{width:100%;max-width:260px;background:linear-gradient(135deg,var(--teal),#0f766e);border:none;border-radius:12px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;cursor:pointer;}
.join-btn:active{opacity:.8;}
.join-err{color:var(--red);font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;margin-top:10px;min-height:20px;}

/* ── CONNECTING ── */
.connecting-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.connecting-txt{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--dim);}

/* ── GAME SCREEN ── */
.game-screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.player-list{flex:1;overflow-y:auto;padding:8px 10px 20px;}
.player-card{background:var(--sur);border:1px solid var(--dark4);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .15s;}
.player-card.on-off{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);}
.player-card.on-def{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.04);}
.player-card.is-qb{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.04);}
.player-card.absent{opacity:.35;}
/* ── collapsed by default — tap header to expand ── */
.pc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.pc-header:active{background:rgba(255,255,255,.03);}
.pc-body{display:none;padding:0 12px 12px;}
.player-card.expanded .pc-body{display:block;}
.pc-chevron{font-size:11px;color:var(--dimmer);transition:transform .2s;flex-shrink:0;margin-left:6px;}
.player-card.expanded .pc-chevron{transform:rotate(180deg);}
.pc-top{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.5px;color:var(--txt);}
.pc-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:2px 7px;border-radius:4px;text-transform:uppercase;}
.pc-tag.off{background:rgba(34,197,94,.15);color:var(--green);}
.pc-tag.def{background:rgba(59,130,246,.15);color:#60a5fa;}
.pc-tag.qb{background:rgba(255,215,0,.15);color:var(--gold);}
.pc-tag.bench{background:rgba(255,255,255,.06);color:var(--dim);}
.stat-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}.player-card.is-qb .stat-btns{grid-template-columns:repeat(4,1fr);}
.stb{background:var(--dark3);border:1px solid var(--dark5);border-radius:10px;padding:8px 4px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform .1s,background .1s;}
.stb:active{transform:scale(.93);background:var(--dark4);}
.stb.popped{animation:pop .22s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.stb-icon{font-size:18px;line-height:1;margin-bottom:2px;}
.stb-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim);}
.stb-count{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--txt);}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.97);border:1px solid var(--dark5);border-radius:10px;padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:var(--txt);z-index:9999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── WAITING ── */
.waiting-msg{text-align:center;padding:40px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--dim);}
</style>
</head>
<body>

<!-- HEADER (hidden until connected) -->
<div class="sc-header" id="sc-header" style="display:none;">
  <div class="sc-header-left">
    <div class="sc-team-name" id="sc-team-name">—</div>
    <div class="sc-vs" id="sc-vs">vs —</div>
  </div>
  <div class="sc-header-center">
    <div class="sc-quarter" id="sc-quarter">Q1</div>
    <div class="sc-score" id="sc-score">0 · 0</div>
  </div>
  <div class="sc-header-right">
    <div class="sc-conn" id="sc-conn">
      <div class="sc-conn-dot" id="sc-conn-dot"></div>
      <span id="sc-conn-txt">Connecting</span>
    </div>
    <div class="sc-mode-badge">STAT COACH</div>
  </div>
</div>

<!-- JOIN SCREEN -->
<div class="join-screen" id="join-screen">
  <div class="join-logo">CG<span>MAX</span> FFTP</div>
  <div class="join-subtitle">Stat Coach Mode</div>
  <div class="join-label">Enter Game Code</div>
  <input type="text" class="join-input" id="join-code-input" maxlength="6" placeholder="A3F9K2" autocomplete="off" autocorrect="off" spellcheck="false" oninput="this.value=this.value.toUpperCase()">
  <button type="button" class="join-btn" onclick="joinGame()">Join Game</button>
  <div class="join-err" id="join-err"></div>
</div>

<!-- CONNECTING SCREEN -->
<div class="connecting-screen" id="connecting-screen">
  <div class="spinner"></div>
  <div class="connecting-txt">Connecting to game…</div>
</div>

<!-- GAME SCREEN -->
<div class="game-screen" id="game-screen">
  <div class="player-list" id="player-list">
    <div class="waiting-msg" id="waiting-msg">⏳ Waiting for game state from primary coach…</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
(function(){
  var SUPABASE_URL = 'https://auth.cgmaxfftp.com';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiZ3plbXVraHlmbmRxdnNxYXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTkxNDMsImV4cCI6MjA4ODEzNTE0M30.7--HyU0wH4yPTgFsi90yecSPrNng59QVL8Rv0VARETk';

  var sb = null;
  var channel = null;
  var gameCode = null;
  var gameState = null; // latest state from primary
  var localStats = {}; // track counts locally for display

  /* ── STAT DEFINITIONS ── */
  /* ── STAT KEYS — icons match app.html renderPlayer exactly ── */
  var STAT_KEYS = [
    { key:'catches', icon:'🏈', label:'Catch'    },
    { key:'tds',     icon:'⭐', label:'TD'        },
    { key:'flags',   icon:'🏃', label:'Flag Pull' },
    { key:'ints',    icon:'🎯', label:'INT'        },
    { key:'conv1',   icon:'1️⃣', label:'1pt Conv'  },
    { key:'conv2',   icon:'2️⃣', label:'2pt Conv'  },
    { key:'fumbles', icon:'💨', label:'Fumble'     },
    { key:'blocks',  icon:'🛡️', label:'Deflect'   }
  ];

  var QB_STAT_KEYS = [
    { key:'qbTDs',   icon:'🏈', label:'TD Pass'   },
    { key:'qbInts',  icon:'❌', label:'INT'        },
    { key:'qbConvs', icon:'✨', label:'Conv Pass'  },
    { key:'catches', icon:'🏈', label:'Catch'      },
    { key:'tds',     icon:'⭐', label:'TD Rec'     },
    { key:'flags',   icon:'🏃', label:'Flag Pull'  },
    { key:'ints',    icon:'🎯', label:'INT'        },
    { key:'fumbles', icon:'💨', label:'Fumble'     }
  ];

  /* ── INIT ── */
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) {
    showErr('Failed to initialize. Please refresh.');
    return;
  }

  // Auto-join if code is in URL
  var urlCode = new URLSearchParams(window.location.search).get('code');
  if (urlCode && urlCode.length === 6) {
    document.getElementById('join-code-input').value = urlCode.toUpperCase();
    joinGame();
  }

  /* ── JOIN ── */
  function joinGame() {
    var code = document.getElementById('join-code-input').value.trim().toUpperCase();
    if (code.length !== 6) { showErr('Enter the 6-character game code'); return; }
    gameCode = code;
    showErr('');
    showScreen('connecting');
    connectChannel(code);
  }
  window.joinGame = joinGame;

  function connectChannel(code) {
    if (channel) { try { sb.removeChannel(channel); } catch(e) {} }

    channel = sb.channel('cocoach:' + code, { config: { broadcast: { ack: false } } });

    channel
      .on('broadcast', { event: 'game_state' }, function(msg) {
        handleGameState(msg.payload);
      })
      .on('broadcast', { event: 'coach_ping' }, function() {
        // Primary coach sent a ping — we're still connected
        setConnected(true);
      })
      .subscribe(function(status) {
        if (status === 'SUBSCRIBED') {
          setConnected(true);
          showScreen('game');
          // Ask primary to send state immediately
          channel.send({ type: 'broadcast', event: 'stat_coach_joined', payload: { code: code } });
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          setConnected(false);
          showErr('Connection failed. Check the code and try again.');
          showScreen('join');
        }
      });
  }

  /* ── HANDLE INCOMING GAME STATE ── */
  function handleGameState(state) {
    if (!state || !state.roster) return;
    gameState = state;
    setConnected(true);
    updateHeader(state);
    renderPlayers(state);
    showScreen('game');
  }

  /* ── SEND STAT EVENT ── */
  function sendStat(playerName, statKey) {
    if (!channel || !gameState) { showToast('⚠️ Not connected yet'); return; }
    var q = gameState.cq || 1;
    channel.send({
      type: 'broadcast',
      event: 'stat_event',
      payload: { name: playerName, key: statKey, q: q }
    });
    // Track locally for instant UI feedback
    if (!localStats[playerName]) localStats[playerName] = {};
    localStats[playerName][statKey] = (localStats[playerName][statKey] || 0) + 1;
    // Update just that button's count
    var btnId = 'stb-' + safeid(playerName) + '-' + statKey;
    var countEl = document.getElementById(btnId + '-count');
    if (countEl) countEl.textContent = localStats[playerName][statKey];
    // Pop animation
    var btn = document.getElementById(btnId);
    if (btn) { btn.classList.remove('popped'); void btn.offsetWidth; btn.classList.add('popped'); }
    var lbl = { catches:'Catch', tds:'TD', flags:'Flag Pull', ints:'INT', fumbles:'Fumble', blocks:'Deflect', qbTDs:'TD Pass', qbInts:'INT Thrown', qbConvs:'Conv Pass' };
    showToast(firstName(playerName) + ' · ' + (lbl[statKey] || statKey));
  }

  /* ── RENDER ── */
  function updateHeader(state) {
    var header = document.getElementById('sc-header');
    header.style.display = 'flex';
    document.getElementById('sc-team-name').textContent = state.team || 'Your Team';
    document.getElementById('sc-vs').textContent = 'vs ' + (state.opp || 'Opponent');
    document.getElementById('sc-quarter').textContent = 'Q' + (state.cq || 1) + ' of ' + (state.quarters || 2);
    var us = (state.scores && state.scores.us) ? state.scores.us.reduce(function(a,b){return a+b;},0) : 0;
    var them = (state.scores && state.scores.them) ? state.scores.them.reduce(function(a,b){return a+b;},0) : 0;
    document.getElementById('sc-score').textContent = us + ' – ' + them;
    // Apply team colors to CSS vars
    if (state.tc) {
      document.documentElement.style.setProperty('--p', state.tc.primary || '#CC0000');
      document.documentElement.style.setProperty('--s', state.tc.secondary || '#FFD700');
    }
  }

  /* Track which cards are expanded */
  var expandedCards = {};

  /* Format name as "First L." matching app.html convention */
  function displayName(name) {
    var parts = (name || '').trim().split(/\s+/);
    if (parts.length === 1) return parts[0];
    return parts[0] + ' ' + parts[parts.length - 1].charAt(0).toUpperCase() + '.';
  }

  function renderPlayers(state) {
    var list = document.getElementById('player-list');
    var roster = state.roster || [];
    var absent = state.absent || [];
    var qb = state.qb || '';
    var rots = state.rots || {};

    if (roster.length === 0) {
      list.innerHTML = '<div class="waiting-msg">⏳ Waiting for game state…</div>';
      return;
    }

    var html = '';
    roster.forEach(function(name) {
      var isAbsent = absent.indexOf(name) >= 0;
      var isQB = name === qb;
      var onField = rots[name] || null;
      var isExp = !!expandedCards[name];

      var cardClass = 'player-card'
        + (isExp ? ' expanded' : '')
        + (isAbsent ? ' absent' : '')
        + (isQB ? ' is-qb' : onField === 'off' ? ' on-off' : onField === 'def' ? ' on-def' : '');

      var tagHtml = '';
      if (isQB) tagHtml = '<span class="pc-tag qb">QB</span>';
      else if (onField === 'off') tagHtml = '<span class="pc-tag off">OFF</span>';
      else if (onField === 'def') tagHtml = '<span class="pc-tag def">DEF</span>';
      else tagHtml = '<span class="pc-tag bench">Bench</span>';

      var bodyHtml = '';

      if (isQB) {
        var qbBtnHtml = '';
        QB_STAT_KEYS.slice(0,3).forEach(function(s) {
          var count = (localStats[name] && localStats[name][s.key]) ? localStats[name][s.key] : 0;
          var btnId = 'stb-' + safeid(name) + '-' + s.key;
          qbBtnHtml += '<button type="button" class="stb" id="'+btnId+'" onclick="sendStatBtn(''+escq(name)+'',''+s.key+'')">'            +'<div class="stb-icon">'+s.icon+'</div>'            +'<div class="stb-label">'+s.label+'</div>'            +'<div class="stb-count" id="'+btnId+'-count">'+count+'</div>'            +'</button>';
        });
        var recBtnHtml = '';
        QB_STAT_KEYS.slice(3).forEach(function(s) {
          var count = (localStats[name] && localStats[name][s.key]) ? localStats[name][s.key] : 0;
          var btnId = 'stb-' + safeid(name) + '-' + s.key;
          recBtnHtml += '<button type="button" class="stb" id="'+btnId+'" onclick="sendStatBtn(''+escq(name)+'',''+s.key+'')">'            +'<div class="stb-icon">'+s.icon+'</div>'            +'<div class="stb-label">'+s.label+'</div>'            +'<div class="stb-count" id="'+btnId+'-count">'+count+'</div>'            +'</button>';
        });
        bodyHtml = '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,215,0,.6);text-transform:uppercase;margin-bottom:6px;">⚡ QB Stats</div>'          +'<div class="stat-btns" style="grid-template-columns:repeat(3,1fr);margin-bottom:10px;">'+qbBtnHtml+'</div>'          +'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;">Receiving / Defense</div>'          +'<div class="stat-btns">'+recBtnHtml+'</div>';
      } else {
        var btnHtml = '';
        STAT_KEYS.forEach(function(s) {
          var count = (localStats[name] && localStats[name][s.key]) ? localStats[name][s.key] : 0;
          var btnId = 'stb-' + safeid(name) + '-' + s.key;
          btnHtml += '<button type="button" class="stb" id="'+btnId+'" onclick="sendStatBtn(''+escq(name)+'',''+s.key+'')">'            +'<div class="stb-icon">'+s.icon+'</div>'            +'<div class="stb-label">'+s.label+'</div>'            +'<div class="stb-count" id="'+btnId+'-count">'+count+'</div>'            +'</button>';
        });
        bodyHtml = '<div class="stat-btns">'+btnHtml+'</div>';
      }

      html += '<div class="'+cardClass+'" id="card-'+safeid(name)+'">'        +'<div class="pc-header" onclick="toggleCard(''+escq(name)+'')">'          +'<div class="pc-top">'            +'<div class="pc-name">'+htmlEsc(displayName(name))+'</div>'            +tagHtml          +'</div>'          +'<div class="pc-chevron">▼</div>'        +'</div>'        +'<div class="pc-body">'+bodyHtml+'</div>'        +'</div>';
    });
    list.innerHTML = html;
  }

  window.toggleCard = function(name) {
    expandedCards[name] = !expandedCards[name];
    var card = document.getElementById('card-' + safeid(name));
    if (!card) return;
    if (expandedCards[name]) card.classList.add('expanded');
    else card.classList.remove('expanded');
  };
  window.sendStatBtn = function(name, key) { sendStat(name, key); };

  /* ── HELPERS ── */
  function showScreen(name) {
    document.getElementById('join-screen').style.display = name === 'join' ? 'flex' : 'none';
    document.getElementById('connecting-screen').style.display = name === 'connecting' ? 'flex' : 'none';
    document.getElementById('game-screen').style.display = name === 'game' ? 'flex' : 'none';
    if (name !== 'game') document.getElementById('sc-header').style.display = 'none';
  }

  function setConnected(ok) {
    var dot = document.getElementById('sc-conn-dot');
    var txt = document.getElementById('sc-conn-txt');
    if (!dot) return;
    dot.className = 'sc-conn-dot ' + (ok ? 'live' : 'error');
    txt.textContent = ok ? 'Live' : 'Disconnected';
  }

  function showErr(msg) {
    var el = document.getElementById('join-err');
    if (el) el.textContent = msg;
  }

  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function firstName(name) { return (name || '').split(' ')[0]; }

  function safeid(name) { return (name || '').replace(/[^a-zA-Z0-9]/g, '_'); }

  function escq(name) { return (name || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  function htmlEsc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

})();
</script>
</body>
</html>
