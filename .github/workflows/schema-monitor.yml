# =============================================================
#  CGMax FFTP — Weekly Supabase Schema Drift Monitor
#
#  Runs every Monday at 6:30 AM UTC.
#  Probes the live Supabase REST API to verify all expected
#  tables and key columns still exist.
#
#  WHY THIS EXISTS:
#    Vercel backend functions silently break when a Supabase
#    migration renames or drops a table/column they depend on.
#    Coaches see empty rosters or missing stats with no error
#    message because the failure happens server-side.
#
#    Tracked tables:
#      • coach_profiles  — sign-in, profile display
#      • season_backups  — cloud backup / restore
#      • licenses        — license validation on every load
#      • consent_records — COPPA audit trail (legal requirement)
#      • live_games      — Live Parent Scoreboard data
#      • coach_data      — Stat Coach sync
#
#  WHAT HAPPENS ON FAILURE:
#    GitHub automatically emails the repository owner when
#    a workflow fails. You know about schema drift before any
#    coach loses data at their next practice.
#
#  MANUAL RUN:
#    GitHub → Actions → "Supabase Schema Monitor" → Run workflow
# =============================================================

name: 🗄️ Supabase Schema Monitor

on:
  schedule:
    - cron: '30 6 * * 1'   # Every Monday at 6:30 AM UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  schema-check:
    name: Check Supabase Schema Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schema drift detector
        # Uses only Node.js built-ins (https module) — no npm install needed.
        # Reads SUPABASE_URL and SUPABASE_ANON_KEY directly from app.html
        # (intentionally public anon values, not secrets).
        # Exits 1 if any expected table or column is missing.
        # GitHub will email you automatically on failure.
        run: node scripts/schema-check.js
