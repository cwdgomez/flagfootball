# =============================================================
#  CGMax FFTP — Daily SSL Certificate Monitor
#
#  Runs every day at 6 AM UTC. Checks TLS certificate expiry
#  for cgmaxfftp.com and auth.cgmaxfftp.com.
#
#  WHY THIS EXISTS:
#    auth.cgmaxfftp.com is the custom Supabase auth domain.
#    If its certificate expires, every coach sign-in attempt
#    (Google OAuth, Apple OAuth, magic link) fails with a
#    browser security error. Coaches see a red warning page
#    and have no way to understand what happened.
#
#  WHAT HAPPENS ON FAILURE:
#    GitHub automatically emails the repository owner when
#    a workflow fails. You get the alert with 21+ days to
#    renew before any coach is affected.
#
#  MANUAL RUN:
#    GitHub → Actions → "SSL Certificate Monitor" → Run workflow
# =============================================================

name: 🔒 SSL Certificate Monitor

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  ssl-check:
    name: Check SSL Certificate Expiry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check SSL certificate expiry
        # Uses only Node.js built-ins (tls module) — no npm install needed.
        # Fails with exit code 1 if any cert expires within 21 days.
        # GitHub will email you automatically on failure.
        run: node scripts/ssl-check.js
