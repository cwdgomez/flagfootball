# =============================================================
#  CGMax FFTP — Daily Supabase Realtime Health Monitor
#
#  Runs every day at 6:15 AM UTC (15 min after SSL check).
#  Verifies the full Supabase Realtime broadcast pipeline by:
#    1. Connecting to the Realtime WebSocket server
#    2. Joining a broadcast channel (self:true)
#    3. Sending a test message and asserting it echoes back
#    4. Disconnecting cleanly within 8 seconds
#
#  WHY THIS EXISTS:
#    Both Live Parent Scoreboard and Stat Coach mode rely
#    entirely on Supabase Realtime broadcast channels.
#    If the service is degraded, coaches activate those
#    features and parents/secondary coaches receive nothing
#    — completely silent failure with no error shown.
#
#  WHAT HAPPENS ON FAILURE:
#    GitHub automatically emails the repository owner when
#    a workflow fails. You get the alert before coaches are
#    affected at their next practice or game.
#
#  MANUAL RUN:
#    GitHub → Actions → "Supabase Realtime Monitor" → Run workflow
# =============================================================

name: 📡 Supabase Realtime Monitor

on:
  schedule:
    - cron: '15 6 * * *'   # Daily at 6:15 AM UTC (15 min after ssl-monitor)
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  realtime-check:
    name: Check Supabase Realtime Broadcast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ws (WebSocket client)
        # The ws package is required for the Phoenix WebSocket protocol.
        # --no-save keeps it out of package.json (CI-only dependency).
        run: npm install ws --no-save

      - name: Run Supabase Realtime health check
        # Connects to the Realtime WebSocket, joins a broadcast channel,
        # sends a test message, and asserts the echo is received within 8s.
        # Exits 1 if connection fails, join is rejected, or timeout fires.
        # Credentials (anon key + URL) are read directly from app.html —
        # they are intentionally public values, not secrets.
        run: node scripts/realtime-check.js
